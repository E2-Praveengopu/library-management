<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Management System</title>

    <!--
      Google Fonts: Roboto
      We load three weights:
        300 = light text (used for subtitles)
        400 = regular text (used for body text)
        500 = medium text (used for labels)
        700 = bold text (used for headings)
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      React mounts the entire application inside this single <div>.
      Everything you see on screen is rendered here by React.
      Webpack will automatically inject the <script src="bundle.js"> tag below this div.
    -->
    <div id="root"></div>
  </body>
</html>
